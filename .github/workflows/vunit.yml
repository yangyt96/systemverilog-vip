name: VUnit Test

on:
  push:
    branches: [master]
  pull_request:
    branches:
      - master

jobs:
  vunit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run VUnit inside container
        uses: addnab/docker-run-action@v3
        with:
          image: docker.io/filippobrogi/modelsim
          options: -v ${{ github.workspace }}:/workspace
          run: |
            cd /workspace
            find . -name "run.py" -print0 | xargs -0 -n1 python3
